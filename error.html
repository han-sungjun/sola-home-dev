  <style>
    body {

  </style>

  <!-- Add to Home + First Launch UX -->
  <style id="myhills-install-ux-style">
    .myhills-install-banner{
      position:fixed;
      left:16px;
      right:16px;
      bottom:calc(18px + env(safe-area-inset-bottom,0px));
      z-index:100000;
      display:none;
      pointer-events:none;
    }
    .myhills-install-banner.show{
      display:block;
      animation:myhillsInstallUp .28s ease both;
      pointer-events:auto;
    }
    .myhills-install-card{
      width:min(100%,480px);
      margin:0 auto;
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 14px;
      border-radius:24px;
      color:#fff;
      background:rgba(15,23,42,.94);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 22px 48px rgba(15,23,42,.28);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .myhills-install-icon{
      width:46px;
      height:46px;
      border-radius:16px;
      background:#0F172A url('/icons/icon-192.png') center/72% no-repeat;
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .myhills-install-copy{
      flex:1;
      min-width:0;
      line-height:1.35;
    }
    .myhills-install-copy strong{
      display:block;
      font-size:14px;
      font-weight:900;
      letter-spacing:-.02em;
      color:#fff;
    }
    .myhills-install-copy span{
      display:block;
      margin-top:3px;
      font-size:12px;
      font-weight:700;
      color:rgba(255,255,255,.72);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .myhills-install-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .myhills-install-btn,
    .myhills-install-close{
      border:none;
      cursor:pointer;
      font:inherit;
      -webkit-tap-highlight-color:transparent;
    }
    .myhills-install-btn{
      min-width:62px;
      padding:11px 13px;
      border-radius:15px;
      color:#fff;
      background:linear-gradient(135deg,#ef4444,#b91c1c);
      font-size:13px;
      font-weight:900;
      box-shadow:0 10px 22px rgba(239,68,68,.25);
    }
    .myhills-install-close{
      width:34px;
      height:34px;
      border-radius:13px;
      color:rgba(255,255,255,.82);
      background:rgba(255,255,255,.08);
      font-size:18px;
      line-height:1;
    }
    .myhills-install-btn:active,
    .myhills-install-close:active{
      transform:scale(.96);
    }
    .myhills-first-launch{
      position:fixed;
      inset:0;
      z-index:100001;
      display:none;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 65% 30%,rgba(239,68,68,.22),transparent 34%),
        linear-gradient(180deg,#0F172A 0%,#111827 100%);
      opacity:1;
      transition:opacity .48s ease, visibility .48s ease;
    }
    .myhills-first-launch.show{
      display:flex;
    }
    .myhills-first-launch.hide{
      opacity:0;
      visibility:hidden;
    }
    .myhills-first-launch-inner{
      display:grid;
      place-items:center;
      gap:16px;
      transform:translateY(4px);
      animation:myhillsSplashIn .58s cubic-bezier(.2,.9,.2,1) both;
    }
    .myhills-first-launch-icon{
      width:96px;
      height:96px;
      border-radius:28px;
      background:#0F172A url('/icons/icon-192.png') center/72% no-repeat;
      box-shadow:0 24px 50px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .myhills-first-launch-title{
      color:#fff;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .myhills-first-launch-sub{
      margin-top:-8px;
      color:rgba(255,255,255,.68);
      font-size:12px;
      font-weight:700;
    }
    @keyframes myhillsInstallUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes myhillsSplashIn{
      from{opacity:0;transform:translateY(10px) scale(.92)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @media (max-width:380px){
      .myhills-install-card{padding:12px}
      .myhills-install-copy span{display:none}
      .myhills-install-icon{width:42px;height:42px}
      .myhills-install-btn{min-width:58px;padding:10px 12px}
    }
  </style>

  <style id="myhills-ios-safearea-fix">
    :root{--myhills-safe-area-top:env(safe-area-inset-top,0px)}
    @supports (padding-top: constant(safe-area-inset-top)){
      :root{--myhills-safe-area-top:constant(safe-area-inset-top)}
    }
    .app{padding-top:calc(18px + var(--myhills-safe-area-top)) !important}
    .page{padding-top:calc(22px + var(--myhills-safe-area-top)) !important}
    body > .wrap{padding-top:var(--myhills-safe-area-top)}
    body > .box{margin-top:var(--myhills-safe-area-top)}
    .topbar-userbar{min-width:0}
    .user-chip{min-width:0;max-width:min(260px,calc(100vw - 156px))}
    .user-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  </style>

<body>
  <div class="box">
    <h1>404</h1>
    <p>요청하신 페이지를 찾을 수 없습니다.</p>
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
	  <button onclick="location.href='/app'">홈</button>
	  <button onclick="location.href='/app#benefits'">혜택</button>
	  <button onclick="location.href='/app#top5'">TOP5</button>
	</div>
  </div>

	<script src="/env-config.js"></script>
	<script src="/firebase-config.js"></script>
	<script src="/security-log.js"></script>

	<script>
	  async function log404Access() {
		try {
		  if (typeof writeSecurityLog === "function") {
			await writeSecurityLog("ERROR_404", {
			  reason: "not_found_url",
			  path: location.pathname,
			  href: location.href,
			  referrer: document.referrer || ""
			});
		  }
		} catch (e) {
		  console.warn("404 로그 저장 실패:", e);
		}
	  }

	  function goHome() {
		const user = JSON.parse(localStorage.getItem("loginUser") || "null");

		if (user) {
		  location.replace("/app");
		} else {
		  location.replace("/");
		}
	  }

	  window.addEventListener("DOMContentLoaded", () => {
		log404Access();
	  });
	</script>

  <!-- Add to Home + First Launch UX -->
  <div id="myhillsFirstLaunch" class="myhills-first-launch" aria-hidden="true">
    <div class="myhills-first-launch-inner">
      <div class="myhills-first-launch-icon" aria-hidden="true"></div>
      <div class="myhills-first-launch-title">더운정 마이힐스</div>
      <div class="myhills-first-launch-sub">입주민 전용 혜택 웹앱</div>
    </div>
  </div>

  <div id="myhillsInstallBanner" class="myhills-install-banner" aria-hidden="true">
    <div class="myhills-install-card">
      <div class="myhills-install-icon" aria-hidden="true"></div>
      <div class="myhills-install-copy">
        <strong>마이힐스를 앱처럼 이용해보세요</strong>
        <span>홈 화면에 추가하면 더 빠르게 열 수 있습니다.</span>
      </div>
      <div class="myhills-install-actions">
        <button id="myhillsInstallBtn" class="myhills-install-btn" type="button">설치</button>
        <button id="myhillsInstallClose" class="myhills-install-close" type="button" aria-label="설치 안내 닫기">×</button>
      </div>
    </div>
  </div>


  <script id="myhills-install-ux-script">
    (function(){
      const INSTALL_HIDE_KEY = "myhills_install_banner_closed_v1";
      const FIRST_LAUNCH_KEY = "myhills_first_launch_seen_v1";

      function isStandaloneMode(){
        return window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true ||
          document.referrer.startsWith("android-app://");
      }

      function initFirstLaunch(){
        const splash = document.getElementById("myhillsFirstLaunch");
        if (!splash) return;

        const shouldShow = isStandaloneMode() && !localStorage.getItem(FIRST_LAUNCH_KEY);
        if (!shouldShow) {
          splash.remove();
          return;
        }

        splash.classList.add("show");
        localStorage.setItem(FIRST_LAUNCH_KEY, "1");

        window.setTimeout(function(){
          splash.classList.add("hide");
          window.setTimeout(function(){
            if (splash && splash.parentNode) splash.remove();
          }, 520);
        }, 1250);
      }

      function initInstallBanner(){
        let deferredPrompt = null;
        const banner = document.getElementById("myhillsInstallBanner");
        const installBtn = document.getElementById("myhillsInstallBtn");
        const closeBtn = document.getElementById("myhillsInstallClose");

        if (!banner || !installBtn || !closeBtn) return;

        function hideBanner(saveClose){
          banner.classList.remove("show");
          banner.setAttribute("aria-hidden", "true");
          if (saveClose) localStorage.setItem(INSTALL_HIDE_KEY, String(Date.now()));
        }

        function showBanner(){
          if (isStandaloneMode()) return;
          if (localStorage.getItem(INSTALL_HIDE_KEY)) return;
          banner.classList.add("show");
          banner.setAttribute("aria-hidden", "false");
        }

        window.addEventListener("beforeinstallprompt", function(event){
          event.preventDefault();
          deferredPrompt = event;
          window.setTimeout(showBanner, 1200);
        });

        installBtn.addEventListener("click", async function(){
          if (!deferredPrompt) {
            hideBanner(false);
            return;
          }

          deferredPrompt.prompt();

          try {
            const choice = await deferredPrompt.userChoice;
            if (choice && choice.outcome === "accepted") {
              hideBanner(true);
            }
          } catch (e) {
            console.warn("설치 안내 처리 실패:", e);
          }

          deferredPrompt = null;
        });

        closeBtn.addEventListener("click", function(){
          hideBanner(true);
        });

        window.addEventListener("appinstalled", function(){
          hideBanner(true);
        });

        if (isStandaloneMode()) {
          hideBanner(false);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function(){
          initFirstLaunch();
          initInstallBanner();
        });
      } else {
        initFirstLaunch();
        initInstallBanner();
      }
    })();
  </script>
