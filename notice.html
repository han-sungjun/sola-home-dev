<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <title>더운정 마이힐스 공유 보기</title>
  <meta name="description" content="더운정 마이힐스 입주민 전용 혜택과 공지 바로가기" />

  <!-- Kakao / Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="더운정 마이힐스" />
  <meta property="og:title" content="더운정 마이힐스" />
  <meta property="og:description" content="입주민 전용 혜택과 공지를 앱에서 확인해보세요." />
  <meta property="og:image" content="https://www.sola-home.kr/icons/icon-512.png?v=20260425b" />
  <meta property="og:url" content="https://www.sola-home.kr/share/notice.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="더운정 마이힐스" />
  <meta name="twitter:description" content="입주민 전용 혜택과 공지를 앱에서 확인해보세요." />
  <meta name="twitter:image" content="https://www.sola-home.kr/icons/icon-512.png?v=20260425b" />

  <style>
    :root{
      --bg:#f5f7fb;
      --surface:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#0f172a;
      --line:#e5e7eb;
      --shadow:0 24px 60px rgba(15,23,42,.12);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%);
      color:var(--text);
    }
    body{
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(100%,420px);
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.8);
      border-radius:30px;
      padding:26px;
      box-shadow:var(--shadow);
      text-align:center;
      overflow:hidden;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:5px;
      background:linear-gradient(90deg,#0f172a,#ef4444);
    }
    .logo{
      width:76px;
      height:76px;
      margin:8px auto 16px;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:#f8fafc;
      border:1px solid var(--line);
      overflow:hidden;
    }
    .logo img{
      width:64px;
      height:64px;
      object-fit:contain;
    }
    h1{
      margin:0;
      font-size:24px;
      line-height:1.3;
      letter-spacing:-.05em;
    }
    p{
      margin:12px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }
    .target{
      margin-top:16px;
      padding:12px 14px;
      border-radius:18px;
      background:#f8fafc;
      border:1px solid var(--line);
      color:#334155;
      font-size:13px;
      line-height:1.55;
      word-break:break-all;
    }
    .actions{
      display:grid;
      gap:10px;
      margin-top:22px;
    }
    .btn{
      min-height:52px;
      border:none;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }
    .btn-primary{
      background:linear-gradient(135deg,#0f172a 0%,#111f46 100%);
      color:#fff;
      box-shadow:0 14px 28px rgba(15,23,42,.18);
    }
    .btn-soft{
      background:#fff;
      color:#0f172a;
      border:1px solid var(--line);
    }
    .note{
      margin-top:14px;
      font-size:12px;
      color:#94a3b8;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <img src="/icons/icon-512.png?v=20260425b" alt="더운정 마이힐스" />
    </div>

    <h1>더운정 마이힐스</h1>
    <p>공유받은 공지 또는 혜택을<br>앱에서 바로 확인해보세요.</p>

    <div class="target" id="targetText">이동 정보를 확인하는 중입니다.</div>

    <div class="actions">
      <a class="btn btn-primary" id="openAppBtn" href="/app">앱에서 바로 보기</a>
      <button class="btn btn-soft" id="copyBtn" type="button">링크 복사</button>
    </div>

    <div class="note">
      로그인 상태가 아니면 로그인 후 상세 화면으로 이동합니다.
    </div>
  </main>

  <script>
    /*
      배포 위치 예시:
      /share/notice.html

      카카오 공유 URL 예시:
      https://www.sola-home.kr/share/notice.html?type=notice&id=NOTICE_ID&sid=SHARE_ID

      type:
      - notice
      - benefit
    */

    const params = new URLSearchParams(location.search);
    const type = params.get('type') || 'notice';
    const id = params.get('id') || '';
    const sid = params.get('sid') || '';

    function buildAppUrl(){
      const safeType = type === 'benefit' ? 'benefit' : 'notice';

      if(!id){
        return `${location.origin}/app`;
      }

      const appUrl = new URL(`${location.origin}/${safeType}/${encodeURIComponent(id)}`);
      if(sid) appUrl.searchParams.set('sid', sid);
      appUrl.searchParams.set('from', 'kakao_share_landing');
      return appUrl.toString();
    }

    const appUrl = buildAppUrl();
    const openAppBtn = document.getElementById('openAppBtn');
    const targetText = document.getElementById('targetText');
    const copyBtn = document.getElementById('copyBtn');

    openAppBtn.href = appUrl;

    if(id){
      targetText.textContent = `${type === 'benefit' ? '혜택' : '공지'} 상세로 이동합니다.`;
    }else{
      targetText.textContent = '앱 메인으로 이동합니다.';
    }

    copyBtn.addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(appUrl);
        copyBtn.textContent = '복사 완료';
        setTimeout(() => copyBtn.textContent = '링크 복사', 1400);
      }catch(_){
        location.href = appUrl;
      }
    });

    /*
      모바일에서는 랜딩 페이지 체류를 줄이기 위해 자동 이동.
      PC 카카오톡에서는 사용자가 버튼을 직접 누르게 두는 편이 안정적입니다.
    */
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    if(isMobile && id){
      setTimeout(() => {
        location.href = appUrl;
      }, 900);
    }
  </script>
</body>
</html>
