<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="더운정 마이힐스 회원가입" />
  <title>더운정 마이힐스 - 회원가입</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --surface:rgba(255,255,255,.9);
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#0f172a;
      --accent:#ef4444;
      --success:#16a34a;
      --shadow:0 20px 40px rgba(15,23,42,.10);
      --radius-xl:28px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%);
      color:var(--text);
    }
    body{
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:20px;
    }
    .wrap{width:min(100%,520px)}
    .hero{
      position:relative;
      overflow:hidden;
      padding:24px;
      border-radius:30px;
      color:#fff;
      background:
        radial-gradient(circle at top right,rgba(255,255,255,.28),transparent 30%),
        linear-gradient(135deg,#111827 0%,#1f2937 46%,#ef4444 100%);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-26px;
      top:-12px;
      width:118px;
      height:118px;
      border-radius:34px;
      background:rgba(255,255,255,.14);
      transform:rotate(18deg);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      font-size:12px;
    }
    .hero h1{margin:14px 0 8px;font-size:28px;line-height:1.2;letter-spacing:-.05em}
    .hero p{margin:0;line-height:1.7;color:rgba(255,255,255,.92);font-size:14px}
    .panel{
      background:var(--surface);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      border-radius:var(--radius-xl);
      padding:20px;
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo{
      width:52px;height:52px;border-radius:18px;display:grid;place-items:center;
      background:#fff;box-shadow:var(--shadow);font-size:24px;flex:0 0 auto;
    }
    .brand h2{margin:0;font-size:22px;letter-spacing:-.04em}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .field{display:grid;gap:8px;margin-bottom:14px}
    .field label{font-size:13px;color:var(--muted);font-weight:700}
    .input,.select,.textarea{
      width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;
      padding:15px 16px;outline:none;font-size:15px;color:var(--text);
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .textarea{min-height:100px;resize:vertical}
    .input:focus,.select:focus,.textarea:focus{
      border-color:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.16);
    }
    .inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .inline-check{display:flex;gap:10px;align-items:flex-start;margin:8px 0 0}
    .helper{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 2px 16px}
    .check-row{display:flex;gap:8px;align-items:center}
    .btn{
      width:100%;border:none;border-radius:18px;padding:15px 16px;cursor:pointer;
      font-weight:800;font-size:15px;display:inline-flex;align-items:center;justify-content:center;
      gap:8px;transition:transform .15s ease, opacity .15s ease, background-color .15s ease;
    }
    .btn:active{transform:scale(.985)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-soft{margin-top:10px;background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn[disabled]{opacity:.65;cursor:not-allowed}
    .mini-btn{
      border:none;border-radius:14px;padding:12px 14px;cursor:pointer;font-weight:800;
      font-size:13px;background:#eef2ff;color:#4338ca;white-space:nowrap;
    }
    .input-with-btn{display:grid;grid-template-columns:1fr auto;gap:8px}
    .notice{
      display:none;margin-top:14px;padding:14px 16px;border-radius:18px;font-size:13px;
      line-height:1.55;border:1px solid transparent;white-space:pre-line;
    }
    .notice.show{display:block}
    .notice.info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .notice.error{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .notice.success{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .footer{text-align:center;margin-top:14px;color:var(--muted);font-size:12px;line-height:1.6}
    .env-badge{
      display:none;align-items:center;gap:8px;width:max-content;margin-top:12px;padding:9px 13px;
      border-radius:999px;background:linear-gradient(135deg,#eef2ff 0%,#ede9fe 100%);
      border:1px solid #c7d2fe;color:#4338ca;font-size:12px;font-weight:800;letter-spacing:.02em;
      box-shadow:0 10px 24px rgba(79,70,229,.10);
    }
    .env-badge.show{display:inline-flex}
    .env-badge-dot{width:8px;height:8px;border-radius:999px;background:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.14);flex:0 0 auto}
    .hidden{display:none!important}
    .page-loader{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:rgba(15,23,42,.52);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
      z-index:10000;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease, visibility .22s ease;
    }
    .page-loader.show{opacity:1;visibility:visible;pointer-events:auto}
    .loader-mark{position:relative;width:74px;height:74px;display:flex;align-items:center;justify-content:center;animation:loaderFloat .95s ease-in-out infinite}
    .page-loader.show .loader-mark{animation:loaderFloat .95s ease-in-out infinite, loaderPulse .9s ease-in-out infinite}
    .loader-mark .arm{position:absolute;left:50%;top:50%;width:10px;border-radius:999px;transform-origin:center center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
    .loader-mark .arm.top{height:34px;background:#ffffff;transform:translate(-50%,-72%) rotate(45deg)}
    .loader-mark .arm.left{height:34px;background:#ffffff;transform:translate(-50%,-72%) rotate(-45deg)}
    .loader-mark .arm.mid{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,-2px)}
    .loader-mark .arm.bot{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,12px)}
    .loader-mark .arm.bot2{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,26px)}
    @keyframes loaderFloat{0%,100%{ transform:translateY(0) scale(1);}50%{ transform:translateY(-3px) scale(1.03);}}
    @keyframes loaderPulse{0%{ opacity:.88;}50%{ opacity:1;}100%{ opacity:.9;}}


    /* ===== 운영계 기준: 인라인 상태 메시지 + 비밀번호 보안 UI ===== */
    .inline-check{
      margin-top:6px;
      font-size:12px;
      line-height:1.5;
      display:none;
    }
    .inline-check.show{display:block}
    .inline-check.info{color:#475569}
    .inline-check.success{color:var(--success)}
    .inline-check.error{color:#dc2626}
    .inline-check.loading{color:#1d4ed8}
    .strength-wrap{margin-top:6px}
    .strength-bars{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
      margin-bottom:6px;
    }
    .strength-bar{
      height:8px;
      border-radius:999px;
      background:#e5e7eb;
      transition:background-color .15s ease, opacity .15s ease;
    }
    .strength-text{
      font-size:12px;
      line-height:1.5;
      color:var(--muted);
    }
    .strength-text.weak{color:#dc2626}
    .strength-text.medium{color:#b45309}
    .strength-text.strong{color:var(--success)}
    @media (max-width: 560px){.inline-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">🏠 입주민 전용 회원가입</div>
      <h1>더운정 마이힐스<br>회원가입</h1>
      <p>입주민 인증 후 관리자 승인 완료 시 로그인할 수 있습니다.</p>
    </section>

    <section class="panel">
      <div class="brand">
        <div class="logo">📝</div>
        <div>
          <h2>가입 신청</h2>
          <p>입주민 전용 서비스 신청서</p>
        </div>
      </div>
      <div class="env-badge" id="envBadge"><span class="env-badge-dot"></span><span>DEV ENV</span></div>

      <form id="signupForm">
        <div class="field">
          <label for="loginId">아이디</label>
          <div class="input-with-btn">
            <input id="loginId" class="input" type="text" inputmode="text" autocomplete="username" placeholder="영문 소문자/숫자 4~20자" />
            <button id="checkLoginIdBtn" class="mini-btn" type="button">중복확인</button>
          </div>
          <div id="loginIdStatus" class="inline-check info"></div>
        </div>

        <div class="field">
          <label for="nickname">닉네임</label>
          <div class="input-with-btn">
            <input id="nickname" class="input" type="text" inputmode="text" autocomplete="nickname" placeholder="닉네임 입력" />
            <button id="checkNicknameBtn" class="mini-btn" type="button">중복확인</button>
          </div>
          <div id="nicknameStatus" class="inline-check info"></div>
        </div>

        <div class="inline-2">
          <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" class="input" type="password" autocomplete="new-password" placeholder="6자 이상" />
            <div class="strength-wrap">
              <div class="strength-bars" aria-hidden="true">
                <span id="pwBar1" class="strength-bar"></span>
                <span id="pwBar2" class="strength-bar"></span>
                <span id="pwBar3" class="strength-bar"></span>
              </div>
              <div id="passwordStrengthStatus" class="strength-text">비밀번호 강도를 확인해 주세요.</div>
            </div>
          </div>
          <div class="field">
            <label for="passwordConfirm">비밀번호 확인</label>
            <input id="passwordConfirm" class="input" type="password" autocomplete="new-password" placeholder="비밀번호 재입력" />
            <div id="passwordMatchStatus" class="inline-check info"></div>
          </div>
        </div>

        <div class="inline-2">
          <div class="field">
            <label for="name">성명</label>
            <input id="name" class="input" type="text" autocomplete="name" placeholder="실명 입력" />
          </div>
          <div class="field">
            <label for="email">이메일</label>
            <input id="email" class="input" type="email" autocomplete="email" placeholder="선택 입력" />
          </div>
        </div>

        <div class="inline-2">
          <div class="field">
            <label for="phoneNumber">휴대폰 번호</label>
            <input id="phoneNumber" class="input" type="tel" inputmode="numeric" autocomplete="tel" placeholder="숫자만 입력" />
          </div>
          <div class="field">
            <label for="memberType">회원 유형</label>
            <select id="memberType" class="select">
              <option value="resident" selected>입주민</option>
              <option value="family">가족</option>
              <option value="tenant">세입자</option>
              <option value="other">기타</option>
            </select>
          </div>
        </div>

        <div class="inline-2">
          <div class="field">
            <label for="building">동</label>
            <input id="building" class="input" type="text" inputmode="numeric" placeholder="예: 101" />
          </div>
          <div class="field">
            <label for="unit">호수</label>
            <input id="unit" class="input" type="text" inputmode="numeric" placeholder="예: 1203" />
          </div>
        </div>

        <div class="field">
          <label for="intro">자기소개 / 확인사항</label>
          <textarea id="intro" class="textarea" placeholder="필요 시 간단한 소개나 요청사항을 입력해 주세요."></textarea>
        </div>

        <div class="field">
          <label for="residentProof">입주민 인증 사진</label>
          <input id="residentProof" class="input" type="file" accept="image/*" />
          <div class="helper">세대 확인이 가능한 증빙 이미지를 업로드해 주세요.</div>
        </div>

        <div class="field">
          <label>필수 동의</label>
          <label class="check-row"><input id="agreePrivacy" type="checkbox" /> 개인정보 수집 및 이용에 동의합니다.</label>
          <label class="check-row"><input id="agreePolicy" type="checkbox" /> 서비스 운영 정책에 동의합니다.</label>
        </div>

        <div class="helper">
          가입 신청 후 관리자 승인 전에는 로그인할 수 없습니다. 승인 후 휴대폰 인증이 필요할 수 있습니다.
        </div>

        <button id="signupBtn" class="btn btn-primary" type="submit">회원가입 신청</button>
        <button id="goLoginBtn" class="btn btn-soft" type="button">로그인으로 돌아가기</button>
      </form>

      <div id="notice" class="notice info"></div>
    </section>

    <div class="footer">
      가입 신청 완료 후 관리자 승인 상태를 확인해 주세요.
    </div>
  </div>

  <script type="module">
    import './firebase-config.js';
    import { ENV, CURRENT_API, CURRENT_ROUTE } from './env-config.js';

    const envBadge = document.getElementById('envBadge');
    if (envBadge && ENV === 'dev') envBadge.classList.add('show');

    const signupForm = document.getElementById('signupForm');
    const noticeEl = document.getElementById('notice');
    const goLoginBtn = document.getElementById('goLoginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const checkLoginIdBtn = document.getElementById('checkLoginIdBtn');
    const checkNicknameBtn = document.getElementById('checkNicknameBtn');
    const loginIdStatusEl = document.getElementById('loginIdStatus');
    const nicknameStatusEl = document.getElementById('nicknameStatus');
    const passwordStrengthStatusEl = document.getElementById('passwordStrengthStatus');
    const passwordMatchStatusEl = document.getElementById('passwordMatchStatus');
    const pwBars = [
      document.getElementById('pwBar1'),
      document.getElementById('pwBar2'),
      document.getElementById('pwBar3')
    ];

    const fields = {
      loginId: document.getElementById('loginId'),
      nickname: document.getElementById('nickname'),
      password: document.getElementById('password'),
      passwordConfirm: document.getElementById('passwordConfirm'),
      name: document.getElementById('name'),
      email: document.getElementById('email'),
      phoneNumber: document.getElementById('phoneNumber'),
      memberType: document.getElementById('memberType'),
      building: document.getElementById('building'),
      unit: document.getElementById('unit'),
      intro: document.getElementById('intro'),
      residentProof: document.getElementById('residentProof'),
      agreePrivacy: document.getElementById('agreePrivacy'),
      agreePolicy: document.getElementById('agreePolicy')
    };

    const SIGNUP_FUNCTION_URL = CURRENT_API.signup;
    const CHECK_LOGIN_ID_URL = CURRENT_API.checkLoginId;
    const CHECK_NICKNAME_URL = CURRENT_API.checkNickname;
    const LOGIN_PAGE_URL = CURRENT_ROUTE.login;

    let loadingCount = 0;
    let loginIdCheckedValue = '';
    let nicknameCheckedValue = '';

    function showNotice(message, type = 'info') {
      noticeEl.className = `notice show ${type}`;
      noticeEl.textContent = message;
    }

    function hideNotice() {
      noticeEl.className = 'notice info';
      noticeEl.textContent = '';
    }

    function setInlineStatus(element, message = '', type = 'info') {
      if (!element) return;
      element.textContent = message;
      element.className = `inline-check show ${type}`;
    }

    function hideInlineStatus(element) {
      if (!element) return;
      element.textContent = '';
      element.className = 'inline-check info';
    }

    function validateLoginIdFormat(value = '') {
      return /^[a-z0-9]{4,20}$/.test(String(value).trim());
    }

    function validateNicknameFormat(value = '') {
      return String(value).trim().length >= 2;
    }

    function getPasswordStrength(password = '') {
      let score = 0;
      if (password.length >= 6) score += 1;
      if (password.length >= 8) score += 1;
      if (/[a-z]/.test(password) && /[0-9]/.test(password)) score += 1;
      if (/[A-Z]/.test(password) || /[^A-Za-z0-9]/.test(password)) score += 1;

      if (password.length < 6) return { level: 'weak', label: '약함', score: 1 };
      if (score <= 2) return { level: 'weak', label: '약함', score: 1 };
      if (score === 3) return { level: 'medium', label: '보통', score: 2 };
      return { level: 'strong', label: '강함', score: 3 };
    }

    function renderPasswordStrength() {
      const password = fields.password.value || '';
      if (!passwordStrengthStatusEl || pwBars.some((bar) => !bar)) return;

      pwBars.forEach((bar) => {
        bar.style.backgroundColor = '#e5e7eb';
      });

      if (!password) {
        passwordStrengthStatusEl.textContent = '비밀번호 강도를 확인해 주세요.';
        passwordStrengthStatusEl.className = 'strength-text';
        return;
      }

      const result = getPasswordStrength(password);
      const color = result.level === 'strong' ? '#16a34a' : result.level === 'medium' ? '#b45309' : '#dc2626';

      for (let i = 0; i < result.score; i += 1) {
        pwBars[i].style.backgroundColor = color;
      }

      let guide = '6자 이상 입력해 주세요.';
      if (result.level === 'weak') guide = '영문, 숫자 조합을 권장합니다.';
      if (result.level === 'medium') guide = '대문자 또는 특수문자를 추가하면 더 안전합니다.';
      if (result.level === 'strong') guide = '안전한 비밀번호입니다.';

      passwordStrengthStatusEl.textContent = `비밀번호 강도: ${result.label} · ${guide}`;
      passwordStrengthStatusEl.className = `strength-text ${result.level}`;
    }

    function validatePasswordMatch() {
      const password = fields.password.value;
      const passwordConfirm = fields.passwordConfirm.value;

      if (!password && !passwordConfirm) {
        hideInlineStatus(passwordMatchStatusEl);
        return false;
      }

      if (!passwordConfirm) {
        setInlineStatus(passwordMatchStatusEl, '비밀번호 확인을 입력해 주세요.', 'info');
        return false;
      }

      if (password === passwordConfirm) {
        setInlineStatus(passwordMatchStatusEl, '비밀번호가 일치합니다.', 'success');
        return true;
      }

      setInlineStatus(passwordMatchStatusEl, '비밀번호가 일치하지 않습니다.', 'error');
      return false;
    }

    function startLoading() {
      const pageLoader = document.getElementById('pageLoader');
      if (!pageLoader) return;
      loadingCount += 1;
      pageLoader.classList.add('show');
      pageLoader.setAttribute('aria-hidden', 'false');
    }

    function finishLoading(callback) {
      const pageLoader = document.getElementById('pageLoader');
      loadingCount = Math.max(loadingCount - 1, 0);

      if (!pageLoader) {
        if (typeof callback === 'function') callback();
        return;
      }

      if (loadingCount > 0) {
        if (typeof callback === 'function') callback();
        return;
      }

      pageLoader.classList.remove('show');
      pageLoader.setAttribute('aria-hidden', 'true');

      if (typeof callback === 'function') {
        setTimeout(() => callback(), 40);
      }
    }

    function replaceWithLoader(url) {
      const pageLoader = document.getElementById('pageLoader');
      if (pageLoader) {
        pageLoader.classList.remove('show');
        pageLoader.setAttribute('aria-hidden', 'true');
      }
      loadingCount = 0;
      window.location.replace(url);
    }

    function normalizeLoginId(value = '') {
      return String(value).trim().toLowerCase();
    }

    function normalizeNickname(value = '') {
      return String(value).trim();
    }

    function normalizeDigits(value = '') {
      return String(value).replace(/\D/g, '');
    }

    function setSubmitting(isSubmitting) {
      signupBtn.disabled = isSubmitting;
      signupBtn.textContent = isSubmitting ? '신청 처리 중...' : '회원가입 신청';
      checkLoginIdBtn.disabled = isSubmitting;
      checkNicknameBtn.disabled = isSubmitting;
      goLoginBtn.disabled = isSubmitting;
      Object.values(fields).forEach((el) => {
        if (el) el.disabled = isSubmitting;
      });
    }

    async function checkLoginId() {
      const loginId = normalizeLoginId(fields.loginId.value);
      if (!loginId) {
        hideNotice();
        setInlineStatus(loginIdStatusEl, '아이디를 입력해 주세요.', 'error');
        fields.loginId.focus();
        return false;
      }

      if (!validateLoginIdFormat(loginId)) {
        hideNotice();
        setInlineStatus(loginIdStatusEl, '아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', 'error');
        fields.loginId.focus();
        return false;
      }

      try {
        checkLoginIdBtn.disabled = true;
        setInlineStatus(loginIdStatusEl, '아이디 중복 여부를 확인 중입니다...', 'loading');
        const url = `${CHECK_LOGIN_ID_URL}?loginId=${encodeURIComponent(loginId)}`;
        const response = await fetch(url, { method: 'GET' });
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '아이디 중복 확인 중 오류가 발생했습니다.');
        }

        if (!result.available) {
          loginIdCheckedValue = '';
          setInlineStatus(loginIdStatusEl, result.message || '이미 사용 중인 아이디입니다.', 'error');
          return false;
        }

        loginIdCheckedValue = loginId;
        setInlineStatus(loginIdStatusEl, result.message || '사용 가능한 아이디입니다.', 'success');
        return true;
      } catch (error) {
        loginIdCheckedValue = '';
        setInlineStatus(loginIdStatusEl, error.message || '아이디 중복 확인 중 오류가 발생했습니다.', 'error');
        return false;
      } finally {
        checkLoginIdBtn.disabled = false;
      }
    }

    async function checkNickname() {
      const nickname = normalizeNickname(fields.nickname.value);
      if (!nickname) {
        hideNotice();
        setInlineStatus(nicknameStatusEl, '닉네임을 입력해 주세요.', 'error');
        fields.nickname.focus();
        return false;
      }

      if (!validateNicknameFormat(nickname)) {
        hideNotice();
        setInlineStatus(nicknameStatusEl, '닉네임은 2자 이상 입력해 주세요.', 'error');
        fields.nickname.focus();
        return false;
      }

      try {
        checkNicknameBtn.disabled = true;
        setInlineStatus(nicknameStatusEl, '닉네임 중복 여부를 확인 중입니다...', 'loading');
        const url = `${CHECK_NICKNAME_URL}?nickname=${encodeURIComponent(nickname)}`;
        const response = await fetch(url, { method: 'GET' });
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '닉네임 중복 확인 중 오류가 발생했습니다.');
        }

        if (!result.available) {
          nicknameCheckedValue = '';
          setInlineStatus(nicknameStatusEl, result.message || '이미 사용 중인 닉네임입니다.', 'error');
          return false;
        }

        nicknameCheckedValue = nickname;
        setInlineStatus(nicknameStatusEl, result.message || '사용 가능한 닉네임입니다.', 'success');
        return true;
      } catch (error) {
        nicknameCheckedValue = '';
        setInlineStatus(nicknameStatusEl, error.message || '닉네임 중복 확인 중 오류가 발생했습니다.', 'error');
        return false;
      } finally {
        checkNicknameBtn.disabled = false;
      }
    }

    fields.loginId.addEventListener('input', (event) => {
      const sanitized = normalizeLoginId(event.target.value);
      if (event.target.value !== sanitized) event.target.value = sanitized;
      loginIdCheckedValue = '';
      if (!sanitized) {
        hideInlineStatus(loginIdStatusEl);
        return;
      }
      if (validateLoginIdFormat(sanitized)) {
        setInlineStatus(loginIdStatusEl, '중복 확인을 진행해 주세요.', 'info');
      } else {
        setInlineStatus(loginIdStatusEl, '아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', 'error');
      }
    });

    fields.nickname.addEventListener('input', () => {
      nicknameCheckedValue = '';
      const nickname = normalizeNickname(fields.nickname.value);
      if (!nickname) {
        hideInlineStatus(nicknameStatusEl);
        return;
      }
      if (validateNicknameFormat(nickname)) {
        setInlineStatus(nicknameStatusEl, '중복 확인을 진행해 주세요.', 'info');
      } else {
        setInlineStatus(nicknameStatusEl, '닉네임은 2자 이상 입력해 주세요.', 'error');
      }
    });

    fields.password.addEventListener('input', () => {
      renderPasswordStrength();
      validatePasswordMatch();
    });

    fields.passwordConfirm.addEventListener('input', validatePasswordMatch);

    fields.phoneNumber.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 11);
    });

    fields.building.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 3);
    });

    fields.unit.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 4);
    });

    renderPasswordStrength();

    checkLoginIdBtn.addEventListener('click', checkLoginId);
    checkNicknameBtn.addEventListener('click', checkNickname);

    goLoginBtn.addEventListener('click', () => {
      startLoading();
      setTimeout(() => replaceWithLoader(LOGIN_PAGE_URL), 60);
    });

    signupForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideNotice();

      const loginId = normalizeLoginId(fields.loginId.value);
      const nickname = normalizeNickname(fields.nickname.value);
      const password = fields.password.value;
      const passwordConfirm = fields.passwordConfirm.value;
      const name = String(fields.name.value || '').trim();
      const email = String(fields.email.value || '').trim().toLowerCase();
      const phoneNumber = normalizeDigits(fields.phoneNumber.value);
      const memberType = String(fields.memberType.value || 'resident').trim();
      const building = normalizeDigits(fields.building.value);
      const unit = normalizeDigits(fields.unit.value);
      const intro = String(fields.intro.value || '').trim();
      const residentProofFile = fields.residentProof.files?.[0] || null;
      const agreePrivacy = !!fields.agreePrivacy.checked;
      const agreePolicy = !!fields.agreePolicy.checked;

      if (!loginId) {
        showNotice('아이디를 입력해주세요.', 'error');
        fields.loginId.focus();
        return;
      }

      if (!validateLoginIdFormat(loginId)) {
        showNotice('아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', 'error');
        fields.loginId.focus();
        return;
      }

      if (!nickname) {
        showNotice('닉네임을 입력해주세요.', 'error');
        fields.nickname.focus();
        return;
      }

      if (!validateNicknameFormat(nickname)) {
        showNotice('닉네임은 2자 이상 입력해 주세요.', 'error');
        fields.nickname.focus();
        return;
      }

      if (!password) {
        showNotice('비밀번호를 입력해주세요.', 'error');
        fields.password.focus();
        return;
      }

      if (password.length < 6) {
        showNotice('비밀번호는 6자 이상이어야 합니다.', 'error');
        fields.password.focus();
        return;
      }

      if (!passwordConfirm) {
        showNotice('비밀번호 확인을 입력해주세요.', 'error');
        fields.passwordConfirm.focus();
        return;
      }

      if (password !== passwordConfirm) {
        validatePasswordMatch();
        showNotice('비밀번호와 비밀번호 확인이 일치하지 않습니다.', 'error');
        fields.passwordConfirm.focus();
        return;
      }

      if (!name) {
        showNotice('성명을 입력해주세요.', 'error');
        fields.name.focus();
        return;
      }

      if (!phoneNumber) {
        showNotice('휴대폰 번호를 입력해주세요.', 'error');
        fields.phoneNumber.focus();
        return;
      }

      if (!building || !unit) {
        showNotice('동과 호수를 입력해주세요.', 'error');
        (!building ? fields.building : fields.unit).focus();
        return;
      }

      if (!residentProofFile) {
        showNotice('입주민 인증 사진을 업로드해 주세요.', 'error');
        fields.residentProof.focus();
        return;
      }

      if (!agreePrivacy || !agreePolicy) {
        showNotice('필수 동의 항목에 체크해 주세요.', 'error');
        return;
      }

      if (loginIdCheckedValue !== loginId) {
        showNotice('아이디 중복 확인을 완료해 주세요.', 'error');
        return;
      }

      if (nicknameCheckedValue !== nickname) {
        showNotice('닉네임 중복 확인을 완료해 주세요.', 'error');
        return;
      }

      setSubmitting(true);
      startLoading();

      try {
        const formData = new FormData();
        formData.append('loginId', loginId);
        formData.append('nickname', nickname);
        formData.append('password', password);
        formData.append('name', name);
        formData.append('email', email);
        formData.append('phoneNumber', phoneNumber);
        formData.append('memberType', memberType);
        formData.append('building', building);
        formData.append('unit', unit);
        formData.append('intro', intro);
        formData.append('agreePrivacy', String(agreePrivacy));
        formData.append('agreePolicy', String(agreePolicy));
        formData.append('residentProof', residentProofFile);

        const response = await fetch(SIGNUP_FUNCTION_URL, {
          method: 'POST',
          body: formData
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '회원가입 신청 중 오류가 발생했습니다.');
        }

        finishLoading();
        showNotice(result.message || '회원가입 신청이 완료되었습니다.', 'success');

        setTimeout(() => {
          replaceWithLoader(LOGIN_PAGE_URL);
        }, 900);
      } catch (error) {
        finishLoading();
        showNotice(error.message || '회원가입 신청 중 오류가 발생했습니다.', 'error');
      } finally {
        setSubmitting(false);
      }
    });
  </script>

  <div id="pageLoader" class="page-loader" aria-hidden="true">
    <div class="loader-mark" aria-label="로딩 중" role="status">
      <span class="arm top"></span>
      <span class="arm left"></span>
      <span class="arm mid"></span>
      <span class="arm bot"></span>
      <span class="arm bot2"></span>
    </div>
  </div>
</body>
</html>
