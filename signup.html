<!DOCTYPE html>

<html lang="ko">
<head>
<!-- PWA / App Icon -->
<link href="/manifest.json" rel="manifest"/>
<meta content="#0F172A" name="theme-color"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<link href="/icons/icon-192.png" rel="icon"/>
<link href="/icons/icon-180.png" rel="apple-touch-icon"/>
<!-- iOS Splash Images -->
<link href="/icons/splash-ios-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" rel="apple-touch-startup-image"/>
<link href="/icons/splash-ios-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" rel="apple-touch-startup-image"/>
<link href="/icons/splash-ios-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" rel="apple-touch-startup-image"/>
<link href="/icons/splash-ios-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" rel="apple-touch-startup-image"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="더운정 마이힐스 회원가입" name="description"/>
<title>더운정 마이힐스 - 회원가입</title>
<style>
    :root{
      --bg:#f5f7fb;
      --surface:rgba(255,255,255,.9);
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#0f172a;
      --accent:#ef4444;
      --success:#16a34a;
      --shadow:0 20px 40px rgba(15,23,42,.10);
      --radius-xl:28px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%);
      color:var(--text);
    }
    body{
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:20px;
    }
    .wrap{width:min(100%,520px)}
    .hero{
      position:relative;
      overflow:hidden;
      padding:24px;
      border-radius:30px;
      color:#fff;
      background:
        radial-gradient(circle at top right,rgba(255,255,255,.28),transparent 30%),
        linear-gradient(135deg,#111827 0%,#1f2937 46%,#ef4444 100%);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-26px;
      top:-12px;
      width:118px;
      height:118px;
      border-radius:34px;
      background:rgba(255,255,255,.14);
      transform:rotate(18deg);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      font-size:12px;
    }
    .hero h1{margin:14px 0 8px;font-size:28px;line-height:1.2;letter-spacing:-.05em}
    .hero p{margin:0;line-height:1.7;color:rgba(255,255,255,.92);font-size:14px}
    .panel{
      background:var(--surface);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      border-radius:var(--radius-xl);
      padding:20px;
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo{
      width:52px;height:52px;border-radius:18px;display:grid;place-items:center;
      background:#fff;box-shadow:var(--shadow);font-size:24px;flex:0 0 auto;
    }
    .brand h2{margin:0;font-size:22px;letter-spacing:-.04em}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .field{display:grid;gap:8px;margin-bottom:14px}
    .field label{font-size:13px;color:var(--muted);font-weight:700}
    .input,.select,.textarea{
      width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;
      padding:15px 16px;outline:none;font-size:15px;color:var(--text);
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .textarea{min-height:100px;resize:vertical}
    .input:focus,.select:focus,.textarea:focus{
      border-color:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.16);
    }
    .inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .inline-check{display:flex;gap:10px;align-items:flex-start;margin:8px 0 0}
    .helper{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 2px 16px}
    .check-row{display:flex;gap:8px;align-items:center}
    .btn{
      width:100%;border:none;border-radius:18px;padding:15px 16px;cursor:pointer;
      font-weight:800;font-size:15px;display:inline-flex;align-items:center;justify-content:center;
      gap:8px;transition:transform .15s ease, opacity .15s ease, background-color .15s ease;
    }
    .btn:active{transform:scale(.985)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-soft{margin-top:10px;background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }
    .btn-row .btn{
      width:100%;
      margin-top:0;
    }
    .btn[disabled]{opacity:.65;cursor:not-allowed}
    .mini-btn{
      border:none;border-radius:14px;padding:12px 14px;cursor:pointer;font-weight:800;
      font-size:13px;background:#eef2ff;color:#4338ca;white-space:nowrap;
    }
    .input-with-btn{display:grid;grid-template-columns:1fr auto;gap:8px}
    .notice{
      display:none;margin-top:14px;padding:14px 16px;border-radius:18px;font-size:13px;
      line-height:1.55;border:1px solid transparent;white-space:pre-line;
    }
    .notice.show{display:block}
    .notice.info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .notice.error{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .notice.success{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .footer{text-align:center;margin-top:14px;color:var(--muted);font-size:12px;line-height:1.6}
    .env-badge{
      display:none;align-items:center;gap:8px;width:max-content;margin-top:12px;padding:9px 13px;
      border-radius:999px;background:linear-gradient(135deg,#eef2ff 0%,#ede9fe 100%);
      border:1px solid #c7d2fe;color:#4338ca;font-size:12px;font-weight:800;letter-spacing:.02em;
      box-shadow:0 10px 24px rgba(79,70,229,.10);
    }
    .env-badge.show{display:inline-flex}
    .env-badge-dot{width:8px;height:8px;border-radius:999px;background:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.14);flex:0 0 auto}

    .hero > .eyebrow,
    .hero > h1,
    .hero > p{
      position:relative;
      z-index:2;
    }
    .hero-env{
      position:absolute;
      top:16px;
      right:16px;
      margin-top:0;
      z-index:3;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.38);
      color:#fff;
      box-shadow:none;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .hero-env .env-badge-dot{
      background:#a5b4fc;
      box-shadow:0 0 0 4px rgba(255,255,255,.16);
    }
    .hidden{display:none!important}
    .page-loader{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:rgba(15,23,42,.52);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
      z-index:10000;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease, visibility .22s ease;
    }
    .page-loader.show{opacity:1;visibility:visible;pointer-events:auto}
    .loader-mark{position:relative;width:74px;height:74px;display:flex;align-items:center;justify-content:center;animation:loaderFloat .95s ease-in-out infinite}
    .page-loader.show .loader-mark{animation:loaderFloat .95s ease-in-out infinite, loaderPulse .9s ease-in-out infinite}
    .loader-mark .arm{position:absolute;left:50%;top:50%;width:10px;border-radius:999px;transform-origin:center center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
    .loader-mark .arm.top{height:34px;background:#ffffff;transform:translate(-50%,-72%) rotate(45deg)}
    .loader-mark .arm.left{height:34px;background:#ffffff;transform:translate(-50%,-72%) rotate(-45deg)}
    .loader-mark .arm.mid{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,-2px)}
    .loader-mark .arm.bot{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,12px)}
    .loader-mark .arm.bot2{width:42px;height:8px;background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);transform:translate(-50%,26px)}
    @keyframes loaderFloat{0%,100%{ transform:translateY(0) scale(1);}50%{ transform:translateY(-3px) scale(1.03);}}
    @keyframes loaderPulse{0%{ opacity:.88;}50%{ opacity:1;}100%{ opacity:.9;}}

    /* ===== 운영계 기준: 인라인 상태 메시지 + 비밀번호 보안 UI ===== */
    .inline-check{
      margin-top:6px;
      font-size:12px;
      line-height:1.5;
      display:none;
    }
    .inline-check.show{display:block}
    .inline-check.info{color:#475569}
    .inline-check.success{color:var(--success)}
    .inline-check.error{color:#dc2626}
    .inline-check.loading{color:#1d4ed8}
    .strength-wrap{margin-top:6px}
    .strength-bars{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
      margin-bottom:6px;
    }
    .strength-bar{
      height:8px;
      border-radius:999px;
      background:#e5e7eb;
      transition:background-color .15s ease, opacity .15s ease;
    }
    .strength-text{
      font-size:12px;
      line-height:1.5;
      color:var(--muted);
    }
    .strength-text.weak{color:#dc2626}
    .strength-text.medium{color:#b45309}
    .strength-text.strong{color:var(--success)}
    @media (max-width: 560px){.inline-2{grid-template-columns:1fr}}

    .app-alert{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:10001;background:rgba(15,23,42,.46);backdrop-filter:blur(4px)}
    .app-alert.show{display:flex}
    .app-alert-card{width:min(100%,360px);background:#fff;border:1px solid rgba(255,255,255,.75);box-shadow:0 30px 60px rgba(15,23,42,.20);border-radius:26px;padding:22px}
    .app-alert-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .app-alert-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:#fff7ed;color:#c2410c;font-size:20px;flex:0 0 auto;border:1px solid #fed7aa}
    .app-alert-title{margin:0;font-size:18px;letter-spacing:-.03em}
    .app-alert-message{margin:0;color:var(--muted);font-size:14px;line-height:1.65;white-space:pre-line}
    .app-alert-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .app-alert-confirm{min-width:92px;border:none;border-radius:16px;padding:12px 16px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer}

  </style>
<!-- Add to Home + First Launch UX -->
<style id="myhills-install-ux-style">
    .myhills-install-banner{
      position:fixed;
      left:16px;
      right:16px;
      bottom:calc(18px + env(safe-area-inset-bottom,0px));
      z-index:100000;
      display:none;
      pointer-events:none;
    }
    .myhills-install-banner.show{
      display:block;
      animation:myhillsInstallUp .28s ease both;
      pointer-events:auto;
    }
    .myhills-install-card{
      width:min(100%,480px);
      margin:0 auto;
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 14px;
      border-radius:24px;
      color:#fff;
      background:rgba(15,23,42,.94);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 22px 48px rgba(15,23,42,.28);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .myhills-install-icon{
      width:46px;
      height:46px;
      border-radius:16px;
      background:#0F172A url('/icons/icon-192.png') center/72% no-repeat;
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .myhills-install-copy{
      flex:1;
      min-width:0;
      line-height:1.35;
    }
    .myhills-install-copy strong{
      display:block;
      font-size:14px;
      font-weight:900;
      letter-spacing:-.02em;
      color:#fff;
    }
    .myhills-install-copy span{
      display:block;
      margin-top:3px;
      font-size:12px;
      font-weight:700;
      color:rgba(255,255,255,.72);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .myhills-install-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .myhills-install-btn,
    .myhills-install-close{
      border:none;
      cursor:pointer;
      font:inherit;
      -webkit-tap-highlight-color:transparent;
    }
    .myhills-install-btn{
      min-width:62px;
      padding:11px 13px;
      border-radius:15px;
      color:#fff;
      background:linear-gradient(135deg,#ef4444,#b91c1c);
      font-size:13px;
      font-weight:900;
      box-shadow:0 10px 22px rgba(239,68,68,.25);
    }
    .myhills-install-close{
      width:34px;
      height:34px;
      border-radius:13px;
      color:rgba(255,255,255,.82);
      background:rgba(255,255,255,.08);
      font-size:18px;
      line-height:1;
    }
    .myhills-install-btn:active,
    .myhills-install-close:active{
      transform:scale(.96);
    }
    .myhills-first-launch{
      position:fixed;
      inset:0;
      z-index:100001;
      display:none;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 65% 30%,rgba(239,68,68,.22),transparent 34%),
        linear-gradient(180deg,#0F172A 0%,#111827 100%);
      opacity:1;
      transition:opacity .48s ease, visibility .48s ease;
    }
    .myhills-first-launch.show{
      display:flex;
    }
    .myhills-first-launch.hide{
      opacity:0;
      visibility:hidden;
    }
    .myhills-first-launch-inner{
      display:grid;
      place-items:center;
      gap:16px;
      transform:translateY(4px);
      animation:myhillsSplashIn .58s cubic-bezier(.2,.9,.2,1) both;
    }
    .myhills-first-launch-icon{
      width:96px;
      height:96px;
      border-radius:28px;
      background:#0F172A url('/icons/icon-192.png') center/72% no-repeat;
      box-shadow:0 24px 50px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .myhills-first-launch-title{
      color:#fff;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .myhills-first-launch-sub{
      margin-top:-8px;
      color:rgba(255,255,255,.68);
      font-size:12px;
      font-weight:700;
    }
    @keyframes myhillsInstallUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes myhillsSplashIn{
      from{opacity:0;transform:translateY(10px) scale(.92)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @media (max-width:380px){
      .myhills-install-card{padding:12px}
      .myhills-install-copy span{display:none}
      .myhills-install-icon{width:42px;height:42px}
      .myhills-install-btn{min-width:58px;padding:10px 12px}
    }
  </style>
</head>
<body>
<div class="wrap">
<section class="hero">
<div class="eyebrow">🏠 입주민 전용 회원가입</div>
<div class="env-badge hero-env" id="envBadge"><span class="env-badge-dot"></span><span>DEV ENV</span></div>
<h1>더운정 마이힐스<br/>회원가입</h1>
<p>가입 신청 후 관리자 확인을 거쳐 이용할 수 있습니다.</p>
</section>
<section class="panel">
<div class="brand">
<div class="logo">📝</div>
<div>
<h2>가입 신청</h2>
<p>입주민 전용 서비스 신청서</p>
</div>
</div>
<form id="signupForm">
<div class="field">
<label for="loginId">아이디</label>
<div class="input-with-btn">
<input autocomplete="username" class="input" id="loginId" inputmode="text" placeholder="영문 소문자/숫자 4~20자" type="text"/>
<button class="mini-btn" id="checkLoginIdBtn" type="button">중복확인</button>
</div>
<div class="inline-check info" id="loginIdStatus"></div>
</div>
<div class="field">
<label for="nickname">닉네임</label>
<div class="input-with-btn">
<input autocomplete="nickname" class="input" id="nickname" inputmode="text" placeholder="닉네임 입력" type="text"/>
<button class="mini-btn" id="checkNicknameBtn" type="button">중복확인</button>
</div>
<div class="inline-check info" id="nicknameStatus"></div>
</div>
<div class="inline-2">
<div class="field">
<label for="password">비밀번호</label>
<input autocomplete="new-password" class="input" id="password" placeholder="6자 이상" type="password"/>
<div class="strength-wrap">
<div aria-hidden="true" class="strength-bars">
<span class="strength-bar" id="pwBar1"></span>
<span class="strength-bar" id="pwBar2"></span>
<span class="strength-bar" id="pwBar3"></span>
</div>
<div class="strength-text" id="passwordStrengthStatus">비밀번호 강도를 확인해 주세요.</div>
</div>
</div>
<div class="field">
<label for="passwordConfirm">비밀번호 확인</label>
<input autocomplete="new-password" class="input" id="passwordConfirm" placeholder="비밀번호 재입력" type="password"/>
<div class="inline-check info" id="passwordMatchStatus"></div>
</div>
</div>
<div class="inline-2">


</div>
<div class="inline-2">


</div>
<div class="inline-2">


</div>
<div class="field">
<label for="intro">자기소개 / 확인사항</label>
<textarea class="textarea" id="intro" placeholder="필요 시 간단한 소개나 요청사항을 입력해 주세요."></textarea>
</div>


<div class="helper">가입 신청 후 관리자 승인 완료 시 이용 가능합니다.</div>
<div class="btn-row">
<button class="btn btn-primary" id="signupBtn" type="submit">회원가입 신청</button>
<button class="btn btn-soft" id="goLoginBtn" type="button">로그인으로 돌아가기</button>
</div>
<div class="field"><label class="check-row"><input id="agreeService" type="checkbox"/> 입주민 전용 서비스 이용 안내를 확인했습니다.</label></div></form>
<div class="notice info" id="notice"></div>
</section>
<div class="footer">
      가입 신청 완료 후 관리자 승인 상태를 확인해 주세요.
    </div>
</div>
<script type="module">
    import './firebase-config.js';
    import { ENV, CURRENT_API, CURRENT_ROUTE } from './env-config.js';
    import { getApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getMessaging, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js';
    const envBadge = document.getElementById('envBadge');
    if (envBadge && ENV === 'dev') envBadge.classList.add('show');

    const app = getApp();
    const messaging = getMessaging(app);

    /* =========================
       Foreground 시스템 알림 처리
       - PC 탭 활성 상태에서도 시스템 알림 표시
       - 백그라운드는 firebase-messaging-sw.js가 처리
    ========================= */
    function isDesktopForegroundPushTarget() {
      const ua = String(navigator.userAgent || '').toLowerCase();
      return !(
        ua.includes('android') ||
        ua.includes('iphone') ||
        ua.includes('ipad') ||
        ua.includes('mobile') ||
        ua.includes('samsungbrowser')
      );
    }

    function normalizeForegroundPushPayload(payload = {}) {
      const data = payload.data || {};
      return {
        title: String(data.title || payload.notification?.title || '알림'),
        body: String(data.body || payload.notification?.body || ''),
        url: String(data.url || data.clickUrl || data.link || payload.fcmOptions?.link || '/'),
        noticeId: String(data.noticeId || ''),
        type: String(data.type || 'notice')
      };
    }

    function buildForegroundPushTag(item) {
      return [item.type, item.noticeId, item.title, item.body, item.url].join('|');
    }

    function openForegroundPushUrl(url = '/') {
      const targetUrl = String(url || '/');
      try {
        const absoluteUrl = new URL(targetUrl, window.location.origin).href;
        window.location.href = absoluteUrl;
      } catch (_) {
        window.location.href = '/';
      }
    }

    function setupForegroundSystemPush(messagingInstance) {
      if (!messagingInstance) return;

      onMessage(messagingInstance, (payload) => {
        try {
          if (!isDesktopForegroundPushTarget()) return;
          if (!('Notification' in window)) return;
          if (Notification.permission !== 'granted') return;

          const item = normalizeForegroundPushPayload(payload);
          const notification = new Notification(item.title, {
            body: item.body,
            icon: '/icons/icon-192.png',
            badge: '/icons/icon-192.png',
            tag: buildForegroundPushTag(item),
            renotify: false,
            data: {
              url: item.url,
              noticeId: item.noticeId,
              type: item.type
            }
          });

          notification.onclick = () => {
            window.focus();
            notification.close();
            openForegroundPushUrl(item.url);
          };
        } catch (error) {
          console.warn('foreground 시스템 알림 처리 실패', error);
        }
      });
    }

    setupForegroundSystemPush(messaging);


    const signupForm = document.getElementById('signupForm');

    let loadingCount = 0;

    function showNotice(message, type = 'info') {
      noticeEl.className = `notice show ${type}`;

    function hideNotice() {
      noticeEl.className = 'notice info';
      noticeEl.textContent = '';
    }

    function openModalAlert(message, focusTarget = null, title = '안내') {
      alertFocusTarget = focusTarget;
      alertTitleEl.textContent = title;
      alertMsgEl.textContent = message;
      alertEl.classList.add('show');
      alertEl.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => alertConfirmEl.focus());
      return new Promise((resolve) => {
        alertResolver = resolve;
      });
    }

    function closeModal(result = true) {
      alertEl.classList.remove('show');
      alertEl.setAttribute('aria-hidden', 'true');

      if (alertFocusTarget) {
        alertFocusTarget.focus();
        try {
          const len = alertFocusTarget.value?.length || 0;
          alertFocusTarget.setSelectionRange(len, len);
        } catch (_) {}
      }

      const resolver = alertResolver;
      alertResolver = null;
      if (resolver) resolver(result);
    }

    alertConfirmEl.addEventListener('click', () => closeModal(true));
    alertEl.addEventListener('click', (event) => {
      if (event.target === alertEl) closeModal(false);
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && alertEl.classList.contains('show')) closeModal(false);
    });

    function setInlineStatus(element, message = '', type = 'info') {
      if (!element) return;
      element.textContent = message;
      element.className = `inline-check show ${type}`;
    }

    function hideInlineStatus(element) {
      if (!element) return;
      element.textContent = '';
      element.className = 'inline-check info';
    }

    function validateLoginIdFormat(value = '') {
      return /^[a-z0-9]{4,20}$/.test(String(value).trim());
    }

    function validateNicknameFormat(value = '') {
      return String(value).trim().length >= 2;
    }

    function getPasswordStrength(password = '') {
      let score = 0;
      if (password.length >= 6) score += 1;
      if (password.length >= 8) score += 1;
      if (/[a-z]/.test(password) && /[0-9]/.test(password)) score += 1;
      if (/[A-Z]/.test(password) || /[^A-Za-z0-9]/.test(password)) score += 1;

      if (password.length < 6) return { level: 'weak', label: '약함', score: 1 };
      if (score <= 2) return { level: 'weak', label: '약함', score: 1 };
      if (score === 3) return { level: 'medium', label: '보통', score: 2 };
      return { level: 'strong', label: '강함', score: 3 };
    }

    function renderPasswordStrength() {
      const password = fields.password.value || '';
      if (!passwordStrengthStatusEl || pwBars.some((bar) => !bar)) return;

      pwBars.forEach((bar) => {
        bar.style.backgroundColor = '#e5e7eb';
      });

      if (!password) {
        passwordStrengthStatusEl.textContent = '비밀번호 강도를 확인해 주세요.';
        passwordStrengthStatusEl.className = 'strength-text';
        return;
      }

      const result = getPasswordStrength(password);
      const color = result.level === 'strong' ? '#16a34a' : result.level === 'medium' ? '#b45309' : '#dc2626';

      for (let i = 0; i < result.score; i += 1) {
        pwBars[i].style.backgroundColor = color;
      }

      let guide = '6자 이상 입력해 주세요.';
      if (result.level === 'weak') guide = '영문, 숫자 조합을 권장합니다.';
      if (result.level === 'medium') guide = '대문자 또는 특수문자를 추가하면 더 안전합니다.';
      if (result.level === 'strong') guide = '안전한 비밀번호입니다.';

      passwordStrengthStatusEl.textContent = `비밀번호 강도: ${result.label} · ${guide}`;
      passwordStrengthStatusEl.className = `strength-text ${result.level}`;
    }

    function validatePasswordMatch() {
      const password = fields.password.value;
      const passwordConfirm = fields.passwordConfirm.value;

      if (!password && !passwordConfirm) {
        hideInlineStatus(passwordMatchStatusEl);
        return false;
      }

      if (!passwordConfirm) {
        setInlineStatus(passwordMatchStatusEl, '비밀번호 확인을 입력해 주세요.', 'info');
        return false;
      }

      if (password === passwordConfirm) {
        setInlineStatus(passwordMatchStatusEl, '비밀번호가 일치합니다.', 'success');
        return true;
      }

      setInlineStatus(passwordMatchStatusEl, '비밀번호가 일치하지 않습니다.', 'error');
      return false;
    }

    function startLoading() {
      const pageLoader = document.getElementById('pageLoader');
      if (!pageLoader) return;
      loadingCount += 1;
      pageLoader.classList.add('show');
      pageLoader.setAttribute('aria-hidden', 'false');
    }

    function finishLoading(callback) {
      const pageLoader = document.getElementById('pageLoader');
      loadingCount = Math.max(loadingCount - 1, 0);

      if (!pageLoader) {
        if (typeof callback === 'function') callback();
        return;
      }

      if (loadingCount > 0) {
        if (typeof callback === 'function') callback();
        return;
      }

      pageLoader.classList.remove('show');
      pageLoader.setAttribute('aria-hidden', 'true');

      if (typeof callback === 'function') {
        setTimeout(() => callback(), 40);
      }
    }

    function replaceWithLoader(url) {
      const pageLoader = document.getElementById('pageLoader');
      if (pageLoader) {
        pageLoader.classList.remove('show');
        pageLoader.setAttribute('aria-hidden', 'true');
      }
      loadingCount = 0;
      window.location.replace(url);
    }

    function normalizeLoginId(value = '') {
      return String(value).trim().toLowerCase();
    }

    function normalizeNickname(value = '') {
      return String(value).trim();
    }

    function normalizeDigits(value = '') {
      return String(value).replace(/\D/g, '');
    }

    async function stopWithAlert(message, focusTarget = null) {
      showNotice(message, 'error');
      await openModalAlert(message, focusTarget);
    }

    function setSubmitting(isSubmitting) {
      signupBtn.disabled = isSubmitting;
      signupBtn.textContent = isSubmitting ? '신청 처리 중...' : '회원가입 신청';
      checkLoginIdBtn.disabled = isSubmitting;
      checkNicknameBtn.disabled = isSubmitting;
      goLoginBtn.disabled = isSubmitting;
      Object.values(fields).forEach((el) => {
        if (el) el.disabled = isSubmitting;
      });
    }

    async function checkLoginId() {
      const loginId = normalizeLoginId(fields.loginId.value);
      if (!loginId) {
        hideNotice();
        setInlineStatus(loginIdStatusEl, '아이디를 입력해 주세요.', 'error');
        fields.loginId.focus();
        return false;
      }

      if (!validateLoginIdFormat(loginId)) {
        hideNotice();
        setInlineStatus(loginIdStatusEl, '아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', 'error');
        fields.loginId.focus();
        return false;
      }

      try {
        checkLoginIdBtn.disabled = true;
        setInlineStatus(loginIdStatusEl, '아이디 중복 여부를 확인 중입니다...', 'loading');
        const url = `${CHECK_LOGIN_ID_URL}?loginId=${encodeURIComponent(loginId)}`;
        const response = await fetch(url, { method: 'GET' });
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '아이디 중복 확인 중 오류가 발생했습니다.');
        }

        if (!result.available) {
          loginIdCheckedValue = '';
          setInlineStatus(loginIdStatusEl, result.message || '이미 사용 중인 아이디입니다.', 'error');
          return false;
        }

        loginIdCheckedValue = loginId;
        setInlineStatus(loginIdStatusEl, result.message || '사용 가능한 아이디입니다.', 'success');
        return true;
      } catch (error) {
        loginIdCheckedValue = '';
        setInlineStatus(loginIdStatusEl, error.message || '아이디 중복 확인 중 오류가 발생했습니다.', 'error');
        return false;
      } finally {
        checkLoginIdBtn.disabled = false;
      }
    }

    async function checkNickname() {
      const nickname = normalizeNickname(fields.nickname.value);
      if (!nickname) {
        hideNotice();
        setInlineStatus(nicknameStatusEl, '닉네임을 입력해 주세요.', 'error');
        fields.nickname.focus();
        return false;
      }

      if (!validateNicknameFormat(nickname)) {
        hideNotice();
        setInlineStatus(nicknameStatusEl, '닉네임은 2자 이상 입력해 주세요.', 'error');
        fields.nickname.focus();
        return false;
      }

      try {
        checkNicknameBtn.disabled = true;
        setInlineStatus(nicknameStatusEl, '닉네임 중복 여부를 확인 중입니다...', 'loading');
        const url = `${CHECK_NICKNAME_URL}?nickname=${encodeURIComponent(nickname)}`;
        const response = await fetch(url, { method: 'GET' });
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '닉네임 중복 확인 중 오류가 발생했습니다.');
        }

        if (!result.available) {
          nicknameCheckedValue = '';
          setInlineStatus(nicknameStatusEl, result.message || '이미 사용 중인 닉네임입니다.', 'error');
          return false;
        }

        nicknameCheckedValue = nickname;
        setInlineStatus(nicknameStatusEl, result.message || '사용 가능한 닉네임입니다.', 'success');
        return true;
      } catch (error) {
        nicknameCheckedValue = '';
        setInlineStatus(nicknameStatusEl, error.message || '닉네임 중복 확인 중 오류가 발생했습니다.', 'error');
        return false;
      } finally {
        checkNicknameBtn.disabled = false;
      }
    }

    fields.loginId.addEventListener('input', (event) => {
      const sanitized = normalizeLoginId(event.target.value);
      if (event.target.value !== sanitized) event.target.value = sanitized;
      loginIdCheckedValue = '';
      if (!sanitized) {
        hideInlineStatus(loginIdStatusEl);
        return;
      }
      if (validateLoginIdFormat(sanitized)) {
        setInlineStatus(loginIdStatusEl, '중복 확인을 진행해 주세요.', 'info');
      } else {
        setInlineStatus(loginIdStatusEl, '아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', 'error');
      }
    });

    fields.nickname.addEventListener('input', () => {
      nicknameCheckedValue = '';
      const nickname = normalizeNickname(fields.nickname.value);
      if (!nickname) {
        hideInlineStatus(nicknameStatusEl);
        return;
      }
      if (validateNicknameFormat(nickname)) {
        setInlineStatus(nicknameStatusEl, '중복 확인을 진행해 주세요.', 'info');
      } else {
        setInlineStatus(nicknameStatusEl, '닉네임은 2자 이상 입력해 주세요.', 'error');
      }
    });

    fields.password.addEventListener('input', () => {
      renderPasswordStrength();
      validatePasswordMatch();
    });

    fields.passwordConfirm.addEventListener('input', validatePasswordMatch);

    fields.phoneNumber.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 11);
    });

    fields.building.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 3);
    });

    fields.unit.addEventListener('input', (event) => {
      event.target.value = normalizeDigits(event.target.value).slice(0, 4);
    });

    renderPasswordStrength();

    checkLoginIdBtn.addEventListener('click', checkLoginId);

    goLoginBtn.addEventListener('click', () => {

    signupForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideNotice();

      const loginId = normalizeLoginId(fields.loginId.value);
      const nickname = normalizeNickname(fields.nickname.value);
      const password = fields.password.value;
      const passwordConfirm = fields.passwordConfirm.value;
      const name = String(fields.name.value || '').trim();
      const email = String(fields.email.value || '').trim().toLowerCase();
      const phoneNumber = normalizeDigits(fields.phoneNumber.value);
      const memberType = String(fields.memberType.value || 'resident').trim();
      const building = normalizeDigits(fields.building.value);
      const unit = normalizeDigits(fields.unit.value);
      const intro = String(fields.intro.value || '').trim();
      const residentProofFile = fields.residentProof.files?.[0] || null;
      const agreePrivacy = !!fields.agreePrivacy.checked;
      const agreePolicy = !!fields.agreePolicy.checked;

      if (!loginId) {
        await stopWithAlert('아이디를 입력해주세요.', fields.loginId);
        return;
      }

      if (!validateLoginIdFormat(loginId)) {
        await stopWithAlert('아이디는 영문 소문자와 숫자만, 4~20자로 입력해 주세요.', fields.loginId);
        return;
      }

      if (!nickname) {
        await stopWithAlert('닉네임을 입력해주세요.', fields.nickname);
        return;
      }

      if (!validateNicknameFormat(nickname)) {
        await stopWithAlert('닉네임은 2자 이상 입력해 주세요.', fields.nickname);
        return;
      }

      if (!password) {
        await stopWithAlert('비밀번호를 입력해주세요.', fields.password);
        return;
      }

      if (password.length < 6) {
        await stopWithAlert('비밀번호는 6자 이상이어야 합니다.', fields.password);
        return;
      }

      if (!passwordConfirm) {
        await stopWithAlert('비밀번호 확인을 입력해주세요.', fields.passwordConfirm);
        return;
      }

      if (password !== passwordConfirm) {
        validatePasswordMatch();
        await stopWithAlert('비밀번호와 비밀번호 확인이 일치하지 않습니다.', fields.passwordConfirm);
        return;
      }

      if (!name) {
        await stopWithAlert('성명을 입력해주세요.', fields.name);
        return;
      }

      if (!phoneNumber) {
        await stopWithAlert('휴대폰 번호를 입력해주세요.', fields.phoneNumber);
        return;
      }

      if (!building || !unit) {
        await stopWithAlert('동과 호수를 입력해주세요.', !building ? fields.building : fields.unit);
        return;
      }

      if (!residentProofFile) {
        await stopWithAlert('입주민 인증 사진을 업로드해 주세요.', fields.residentProof);
        return;
      }

      if (!agreePrivacy || !agreePolicy) {
        await stopWithAlert('필수 동의 항목에 체크해 주세요.', !agreePrivacy ? fields.agreePrivacy : fields.agreePolicy);
        return;
      }

      if (loginIdCheckedValue !== loginId) {
        await stopWithAlert('아이디 중복 확인을 완료해 주세요.', checkLoginIdBtn);
        return;
      }

      if (nicknameCheckedValue !== nickname) {
        await stopWithAlert('닉네임 중복 확인을 완료해 주세요.', checkNicknameBtn);
        return;
      }

      setSubmitting(true);
      startLoading();

      try {
        const formData = new FormData();
        formData.append('loginId', loginId);
        formData.append('nickname', nickname);
        formData.append('password', password);
        formData.append('name', name);
        formData.append('email', email);
        formData.append('phoneNumber', phoneNumber);
        formData.append('memberType', memberType);
        formData.append('building', building);
        formData.append('unit', unit);
        formData.append('intro', intro);
        formData.append('agreePrivacy', String(agreePrivacy));
        formData.append('agreePolicy', String(agreePolicy));
        formData.append('residentProof', residentProofFile);

        const response = await fetch(SIGNUP_FUNCTION_URL, {
          method: 'POST',
          body: formData
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.message || '회원가입 신청 중 오류가 발생했습니다.');
        }

        finishLoading();
        showNotice(result.message || '회원가입 신청이 완료되었습니다.', 'success');

        setTimeout(() => {
          replaceWithLoader(LOGIN_PAGE_URL);
        }, 900);
      } catch (error) {
        finishLoading();
        showNotice(error.message || '회원가입 신청 중 오류가 발생했습니다.', 'error');
      } finally {
        setSubmitting(false);
      }
    });
  </script>

<script id="myhills-install-ux-script">
    (function(){
      const INSTALL_HIDE_KEY = "myhills_install_banner_closed_v1";
      const FIRST_LAUNCH_KEY = "myhills_first_launch_seen_v1";

      function isStandaloneMode(){
        return window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true ||
          document.referrer.startsWith("android-app://");
      }

      function initFirstLaunch(){
        const splash = document.getElementById("myhillsFirstLaunch");
        if (!splash) return;

        const shouldShow = isStandaloneMode() && !localStorage.getItem(FIRST_LAUNCH_KEY);
        if (!shouldShow) {
          splash.remove();
          return;
        }

        splash.classList.add("show");
        localStorage.setItem(FIRST_LAUNCH_KEY, "1");

        window.setTimeout(function(){
          splash.classList.add("hide");
          window.setTimeout(function(){
            if (splash && splash.parentNode) splash.remove();
          }, 520);
        }, 1250);
      }

      function initInstallBanner(){
        let deferredPrompt = null;
        const banner = document.getElementById("myhillsInstallBanner");
        const installBtn = document.getElementById("myhillsInstallBtn");
        const closeBtn = document.getElementById("myhillsInstallClose");

        if (!banner || !installBtn || !closeBtn) return;

        function hideBanner(saveClose){
          banner.classList.remove("show");
          banner.setAttribute("aria-hidden", "true");
          if (saveClose) localStorage.setItem(INSTALL_HIDE_KEY, String(Date.now()));
        }

        function showBanner(){
          if (isStandaloneMode()) return;
          if (localStorage.getItem(INSTALL_HIDE_KEY)) return;
          banner.classList.add("show");
          banner.setAttribute("aria-hidden", "false");
        }

        window.addEventListener("beforeinstallprompt", function(event){
          event.preventDefault();
          deferredPrompt = event;
          window.setTimeout(showBanner, 1200);
        });

        installBtn.addEventListener("click", async function(){
          if (!deferredPrompt) {
            hideBanner(false);
            return;
          }

          deferredPrompt.prompt();

          try {
            const choice = await deferredPrompt.userChoice;
            if (choice && choice.outcome === "accepted") {
              hideBanner(true);
            }
          } catch (e) {
            console.warn("설치 안내 처리 실패:", e);
          }

          deferredPrompt = null;
        });

        closeBtn.addEventListener("click", function(){
          hideBanner(true);
        });

        window.addEventListener("appinstalled", function(){
          hideBanner(true);
        });

        if (isStandaloneMode()) {
          hideBanner(false);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function(){
          initFirstLaunch();
          initInstallBanner();
        });
      } else {
        initFirstLaunch();
        initInstallBanner();
      }
    })();
  </script>
</body>
</html>
