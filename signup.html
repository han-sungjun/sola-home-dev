  <body data-loading-mode="signup">
    <main class="page">
      <section class="signup-premium-hero-shell signup-premium-hero-shell-structural">
        <div class="brand">
          <div class="logo">
            <img alt class="brand-icon" loading="lazy" src="/icons/internal/home.svg">
          </div>
          <div>
            <h1>
              더운정픽
            </h1>
            <p>
              입주민 전용 혜택 플랫폼
            </p>
          </div>
        </div>
        <section class="hero">
          <div class="hero-badge-row">

            <div class="eyebrow">
            <img alt class="eyebrow-icon" loading="lazy" src="/icons/internal/signup.svg">
            입주민 계정 만들기
          </div>

            <div class="env-badge hero-env" id="signupEnvBadge">
            <span class="env-badge-dot">
            </span>
            <span>
              DEV
            </span>
          </div>

          </div>
          <h2>
            복잡한 절차 없이
            <br>
            바로 시작하세요
          </h2>
          <p>
            입주민 혜택 이용에 필요한 계정 정보만 간단하게 입력하면 됩니다.
          </p>        </section>
        <section class="panel">
          <h3>
            계정 만들기
          </h3>
          <p class="helper">
            입주민 혜택 이용에 필요한 정보만 간단히 입력해 주세요.
          </p>
          <form class="form" id="signupForm" novalidate>
            <div class="field">
              <label for="loginId">
                아이디
              </label>
              <div class="input-row">
                <input autocomplete="username" id="loginId" maxlength="20" minlength="4" name="loginId" pattern="[A-Za-z0-9]+" placeholder="영문+숫자 4~20자" required>
                <button class="check-btn" id="checkLoginIdBtn" type="button">
                  중복 확인
                </button>
              </div>
              <div class="field-msg" id="loginIdMsg">
                영문과 숫자만 사용할 수 있습니다.
              </div>
            </div>
            <div class="field">
              <label for="password">
                비밀번호
              </label>
              <input autocomplete="new-password" id="password" minlength="8" name="password" placeholder="8자 이상" required type="password">
              <div class="field-msg" id="passwordMsg">
                8자 이상 입력해 주세요.
              </div>
            </div>
            <div class="field">
              <label for="passwordConfirm">
                비밀번호 확인
              </label>
              <input autocomplete="new-password" id="passwordConfirm" minlength="8" name="passwordConfirm" placeholder="비밀번호 재입력" required type="password">
              <div class="field-msg" id="passwordMatchMsg">
                비밀번호를 한 번 더 입력해 주세요.
              </div>
            </div>
            <div class="field">
              <label for="nickname">
                닉네임
              </label>
              <div class="input-row">
                <input id="nickname" maxlength="20" name="nickname" placeholder="예: 더운정픽 입주민" required>
                <button class="check-btn" id="checkNicknameBtn" type="button">
                  중복 확인
                </button>
              </div>
              <div class="field-msg" id="nicknameMsg">
                앱 화면에 표시되는 이름입니다.
              </div>
            </div>
            <div class="field">
              <label for="memberType">
                회원 유형
              </label>
              <select id="memberType" name="memberType" required>
                <option value="resident_apartment">
                  입주민(아파트)
                </option>
                <option value="resident_officetel">
                  입주민(오피스텔)
                </option>
                <option value="etc">
                  기타
                </option>
              </select>
              <div class="field-msg">
                단지 구분을 위한 단순 분류입니다.
              </div>
            </div>
            <div class="field">
              <label for="inviteCode">
                초대 코드 / 안내 코드
                <small style="color:#94a3b8">
                  선택
                </small>
              </label>
              <input id="inviteCode" maxlength="40" name="inviteCode" placeholder="운영진이 안내한 경우에만 입력">
            </div>
            <label class="agree">
              <input id="agree" required type="checkbox">
              <span>
                입주민 전용 혜택 제공을 위한 간단 계정 생성에 동의합니다.
              </span>
            </label>
            <div class="sub-actions signup-action-row">
              <button class="btn" id="submitBtn" type="submit">
                계정 만들기
              </button>
              <button class="btn btn-soft" onclick="location.replace('/')" type="button">
                입장 화면으로
              </button>
            </div>
          </form>
          <div class="status" id="statusBox">
          </div>
        </section>
      </section>
    </main>
    <div aria-hidden="true" class="app-alert" id="appAlert">
      <div aria-describedby="appAlertMessage" aria-labelledby="appAlertTitle" aria-modal="true" class="app-alert-card" role="alertdialog">
        <div class="app-alert-head">
          <div aria-hidden="true" class="app-alert-icon" id="appAlertIcon">
          </div>
          <h3 class="app-alert-title" id="appAlertTitle">
            안내
          </h3>
        </div>
        <p class="app-alert-message" id="appAlertMessage">
        </p>
        <div class="app-alert-actions">
          <button class="app-alert-confirm" id="appAlertConfirm" type="button">
            확인
          </button>
        </div>
      </div>
    </div>
    <div aria-hidden="true" class="page-loader" id="pageLoader">
      <div aria-live="polite" class="loader-content" role="status">
        <div aria-label="로딩 중" class="loader-mark">
          <span aria-hidden="true" class="loader-orbit"></span>
          <img alt="" aria-hidden="true" src="/icons/internal/brand-symbol-real.png">
          <span class="arm top"></span>
          <span class="arm left"></span>
          <span class="arm mid"></span>
          <span class="arm bot"></span>
          <span class="arm bot2"></span>
        </div>
        <div aria-hidden="true" class="loader-copy">
          <p class="loader-message">입주민 전용 서비스를 연결하고 있어요</p>
          <p class="loader-sub-message">잠시만 기다려주세요</p>
        </div>
      </div>
    </div>
